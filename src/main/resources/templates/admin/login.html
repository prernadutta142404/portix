<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Admin Login | PORTIX</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #080d1d;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .login-card {
            width: 100%;
            max-width: 450px;
            background: #17213d;
            border: 1px solid #2d3859;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,.3);
        }

        .logo {
            text-align: center;
            font-size: 32px;
            font-weight: 800;
            letter-spacing: 2px;
            margin-bottom: 30px;
        }

        .logo span {
            color: #805cff;
        }

        h1 {
            text-align: center;
            margin-bottom: 10px;
        }

        .subtitle {
            text-align: center;
            color: #aeb9d6;
            margin-bottom: 30px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
        }

        input {
            width: 100%;
            padding: 14px;
            margin-bottom: 20px;
            border: 1px solid #35415f;
            border-radius: 10px;
            background: #202a49;
            color: white;
            outline: none;
        }

        input:focus {
            border-color: #805cff;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            background: #7654ff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        button:hover {
            background: #6845ff;
        }

        #adminMessage {
            margin-top: 18px;
            text-align: center;
            color: #ff6b7a;
        }
    </style>
</head>

<body>

<div class="login-card">

    <div class="logo">
        PORTI<span>X</span>
    </div>

    <h1>Admin Login</h1>

    <p class="subtitle">
        Secure access to PORTIX administration.
    </p>

    <form id="adminLoginForm">

        <label>Email Address</label>

        <input
            type="email"
            id="adminEmail"
            placeholder="Enter admin email"
            required>

        <label>Password</label>

        <input
            type="password"
            id="adminPassword"
            placeholder="Enter password"
            required>

        <button type="submit">
            Login as Admin
        </button>

        <p id="adminMessage"></p>

    </form>

</div>

<script>

const adminLoginForm =
    document.getElementById("adminLoginForm");

adminLoginForm.addEventListener(
    "submit",
    async function(event) {

        event.preventDefault();

        const email =
            document.getElementById("adminEmail").value;

        const password =
            document.getElementById("adminPassword").value;

        const message =
            document.getElementById("adminMessage");

        try {

            const response = await fetch(
                "/api/users/login?role=ADMIN",
                {
                    method: "POST",

                    headers: {
                        "Content-Type": "application/json"
                    },

                    body: JSON.stringify({
                        email: email,
                        password: password
                    })
                }
            );

            if (!response.ok) {
                message.textContent =
                    "Invalid admin credentials.";
                return;
            }

            const user = await response.json();

            if (!user ||
                !user.id ||
                user.role !== "ADMIN") {

                message.textContent =
                    "Access denied. Admin account required.";

                return;
            }

            window.location.href =
                "/admin/dashboard";

        } catch (error) {

            console.error(error);

            message.textContent =
                "Unable to login. Please try again.";
        }

    }
);

</script>

</body>
</html>
