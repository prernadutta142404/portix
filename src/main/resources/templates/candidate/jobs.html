<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Jobs | PORTIX</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #090b14;
            color: white;
        }

        /* HEADER */

        .header {
            padding: 28px 8%;
            background: #0d0f1a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo span {
            color: #8b5cf6;
        }

        .applications-btn {
            text-decoration: none;
            color: white;
            padding: 11px 19px;
            border: 1px solid #8b5cf6;
            border-radius: 8px;
            transition: 0.3s;
        }

        .applications-btn:hover {
            background: #8b5cf6;
        }

        /* MAIN */

        .container {
            width: 90%;
            max-width: 1200px;
            margin: 50px auto;
        }

        .page-header {
            margin-bottom: 35px;
        }

        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .page-header h1 i {
            margin-right: 10px;
        }

        .subtitle {
            color: #9ca3af;
            font-size: 16px;
        }

        /* TOOLBAR */

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 35px;
        }

        .search-box {
            position: relative;
            flex: 1;
        }

        .search-box i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: #9ca3af;
        }

        .toolbar input {
            width: 100%;
            padding: 15px 18px 15px 48px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: #11131f;
            color: white;
            font-size: 15px;
            outline: none;
        }

        .toolbar input:focus {
            border-color: #8b5cf6;
        }

        .toolbar input::placeholder {
            color: #9ca3af;
        }

        .toolbar select {
            min-width: 220px;
            padding: 15px 18px;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            background: #11131f;
            color: white;
            outline: none;
            cursor: pointer;
        }

        /* JOB GRID */

        .job-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
        }

        .job-card {
            background: #11131f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 25px;
            transition: transform 0.25s ease, border-color 0.25s ease;
        }

        .job-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139,92,246,0.6);
        }

        .job-card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 20px;
        }

        .job-title {
            font-size: 22px;
            margin-bottom: 8px;
        }

        .company {
            color: #9ca3af;
            font-size: 14px;
        }

        .active-badge {
            background: rgba(34,197,94,0.15);
            color: #86efac;
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .job-meta {
            padding: 18px 0;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
            margin-bottom: 20px;
        }

        .job-meta p {
            color: #b8bfd8;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .job-meta p:last-child {
            margin-bottom: 0;
        }

        .job-meta i {
            width: 22px;
            color: #a78bfa;
        }

        .job-details {
            margin-bottom: 20px;
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            margin-bottom: 12px;
            font-size: 14px;
        }

        .detail-label {
            color: #9ca3af;
        }

        .detail-value {
            color: #e5e7eb;
            text-align: right;
        }

        .skills-title {
            font-size: 14px;
            margin-bottom: 12px;
            color: #d1d5db;
        }

        .skills {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 25px;
        }

        .skills span {
            background: rgba(139,92,246,0.15);
            color: #c4b5fd;
            padding: 7px 13px;
            border-radius: 20px;
            font-size: 13px;
        }

        /* BUTTONS */

        .action-buttons {
            display: flex;
        }

        .apply-btn {
            width: 100%;
            display: block;
            text-align: center;
            text-decoration: none;
            padding: 13px;
            border: none;
            border-radius: 9px;
            background: #7c3aed;
            color: white;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
        }

        .apply-btn:hover {
            background: #8b5cf6;
        }

        .applied-btn {
            width: 100%;
            padding: 13px;
            border: 1px solid rgba(139,92,246,0.4);
            border-radius: 9px;
            background: rgba(139,92,246,0.12);
            color: #c4b5fd;
            font-size: 14px;
            font-weight: 600;
            cursor: not-allowed;
        }

        /* EMPTY STATE */

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            background: #11131f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            color: #9ca3af;
        }

        @media (max-width: 700px) {
            .header {
                padding: 22px 5%;
            }

            .container {
                width: 92%;
                margin-top: 35px;
            }

            .page-header h1 {
                font-size: 29px;
            }

            .toolbar {
                flex-direction: column;
            }

            .toolbar select {
                width: 100%;
            }

            .job-grid {
                grid-template-columns: 1fr;
            }

            .job-card-top {
                flex-direction: column;
            }
        }
    </style>

</head>

<body>

<header class="header">

    <div class="header-content">

        <div class="logo">
            PORT<span>IX</span>
        </div>

        <a th:href="@{/candidate/applications}"
           class="applications-btn">
            My Applications
        </a>

    </div>

</header>


<main class="container">

    <div class="page-header">

        <h1>
            <i class="fa-solid fa-briefcase"></i>
            Available Jobs
        </h1>

        <p class="subtitle">
            Find jobs that match your skills and apply instantly.
        </p>

    </div>


    <!-- SEARCH AND FILTER -->

    <div class="toolbar">

        <div class="search-box">

            <i class="fa-solid fa-magnifying-glass"></i>

            <input type="text"
                   placeholder="Search jobs...">

        </div>

        <select>
            <option>All Departments</option>
            <option>Software Development</option>
            <option>Data Science</option>
            <option>Artificial Intelligence</option>
            <option>UI / UX</option>
        </select>

    </div>


    <!-- JOB CARDS -->

    <div class="job-grid"
         th:if="${!jobs.isEmpty()}">

        <div class="job-card"
             th:each="job : ${jobs}">


            <div class="job-card-top">

                <div>

                    <h2 class="job-title"
                        th:text="${job.jobTitle}">
                        Job Title
                    </h2>

                    <p class="company">
                        <i class="fa-solid fa-building"></i>
                        <span th:text="${job.companyName}">
                            Company Name
                        </span>
                    </p>

                </div>

                <span class="active-badge">
                    Active
                </span>

            </div>


            <div class="job-meta">

                <p>
                    <i class="fa-solid fa-location-dot"></i>

                    <span th:text="${job.location}">
                        Location
                    </span>

                    &nbsp;•&nbsp;

                    <span th:text="${job.employmentType}">
                        Employment Type
                    </span>
                </p>


                <p>
                    <i class="fa-solid fa-calendar-days"></i>

                    Posted:

                    <span th:text="${job.postedDate}">
                        Date
                    </span>
                </p>

            </div>


            <div class="job-details">

                <div class="detail-row">

                    <span class="detail-label">
                        Experience
                    </span>

                    <span class="detail-value"
                          th:text="${job.experience}">
                        Experience
                    </span>

                </div>


                <div class="detail-row">

                    <span class="detail-label">
                        Salary
                    </span>

                    <span class="detail-value"
                          th:text="${job.salary}">
                        Salary
                    </span>

                </div>

            </div>


            <h4 class="skills-title">
                Required Skills
            </h4>


            <div class="skills">

                <span th:text="${job.requiredSkills}">
                    Required Skills
                </span>

            </div>


            <div class="action-buttons">

                <a th:if="${!appliedJobs[job.id]}"
                   th:href="@{/candidate/apply/{id}(id=${job.id})}"
                   class="apply-btn">
                    Apply Now
                </a>


                <button th:if="${appliedJobs[job.id]}"
                        class="applied-btn"
                        disabled>
                    Already Applied
                </button>

            </div>

        </div>

    </div>


    <!-- NO JOBS -->

    <div class="empty-state"
         th:if="${jobs.isEmpty()}">

        No jobs are currently available.

    </div>

</main>

</body>

</html>
