<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Payment | PORTIX</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0b1023;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 40px 20px;
        }

        .payment-container {
            width: 100%;
            max-width: 600px;
            background: #18213d;
            border: 1px solid rgba(255,255,255,.08);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 40px rgba(0,0,0,.25);
        }

        h1 {
            margin-bottom: 10px;
        }

        .subtitle {
            color: #b8bfd8;
            margin-bottom: 30px;
        }

        .job-summary {
            background: #202a49;
            padding: 22px;
            border-radius: 14px;
            margin-bottom: 25px;
        }

        .job-summary h2 {
            margin-bottom: 15px;
        }

        .job-summary p {
            color: #b8bfd8;
            margin-bottom: 10px;
        }

        .price-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 0;
            border-top: 1px solid rgba(255,255,255,.1);
            border-bottom: 1px solid rgba(255,255,255,.1);
            margin-bottom: 25px;
        }

        .price {
            font-size: 28px;
            font-weight: 700;
            color: #9b87ff;
        }

        .pay-btn {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 12px;
            background: #7c5cff;
            color: white;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
        }

        .pay-btn:hover {
            background: #6845ff;
        }

        .back-link {
            display: block;
            text-align: center;
            margin-top: 20px;
            color: #b8bfd8;
            text-decoration: none;
        }

        .back-link:hover {
            color: white;
        }
    </style>
</head>

<body>

<div class="payment-container">

    <h1>Pay & Publish</h1>

    <p class="subtitle">
        Complete payment to publish your job opening on PORTIX.
    </p>

    <div class="job-summary">

        <h2 th:text="${job.jobTitle}">
            Job Title
        </h2>

        <p>
            <strong>Company:</strong>
            <span th:text="${job.companyName}"></span>
        </p>

        <p>
            <strong>Location:</strong>
            <span th:text="${job.location}"></span>
        </p>

        <p>
            <strong>Status:</strong>
            Payment Pending
        </p>

    </div>

	<div class="price-box">
	    <div>
	        <div>Job Publishing Fee</div>
	        <small style="color: #b8bfd8;">
	            Launch Offer Discount
	        </small>
	    </div>

	    <div style="text-align: right;">
	        <div style="text-decoration: line-through; color: #b8bfd8;">
	            ₹99
	        </div>
	        <div class="price">
	            ₹0
	        </div>
	    </div>
	</div>

	<form th:action="@{/recruiter/jobs/payment/{id}/success(id=${job.id})}"
	      method="post">

		  <button type="submit" class="pay-btn">
		      Publish Job for Free
		  </button>

	</form>

    <a href="/recruiter/jobs" class="back-link">
        ← Back to Jobs
    </a>

</div>

</body>
</html>
