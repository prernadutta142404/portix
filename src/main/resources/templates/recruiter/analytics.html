<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Analytics | PORTIX</title>

<link rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

<style>

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Segoe UI', sans-serif;
}

body {
    background: #0b1023;
    color: white;
    padding: 40px;
}

.container {
    max-width: 1400px;
    margin: auto;
}

h1 {
    font-size: 42px;
    margin-bottom: 10px;
}

.subtitle {
    color: #b8bfd8;
    margin-bottom: 40px;
}

/* ANALYTICS CARDS */

.stats-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
    gap: 25px;
    margin-top: 40px;
}

.stat-card {
    background: #18213d;
    padding: 30px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
    transition: .3s;
}

.stat-card:hover {
    transform: translateY(-8px);
}

.stat-card i {
    font-size: 34px;
    color: #7c5cff;
    margin-bottom: 20px;
}

.stat-card h3 {
    margin-bottom: 15px;
}

.stat-card span {
    font-size: 40px;
    font-weight: bold;
    background: linear-gradient(135deg,#3b82f6,#9333ea);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
}

/* ANALYTICS SECTIONS */

.analytics-section {
    background: #18213d;
    margin-top: 40px;
    padding: 30px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,.08);
}

.analytics-section h2 {
    margin-bottom: 30px;
}

/* SKILLS */

.skill-item {
    margin-bottom: 25px;
}

.skill-item span {
    display: block;
    margin-bottom: 10px;
    font-weight: 600;
}

.progress {
    width: 100%;
    height: 14px;
    background: #2b365e;
    border-radius: 20px;
    overflow: hidden;
}

.fill {
    height: 100%;
    border-radius: 20px;
    background: linear-gradient(90deg,#7c5cff,#3b82f6);
}

/* RECRUITMENT INSIGHTS */

.insight-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px,1fr));
    gap: 25px;
    margin-top: 30px;
}

.insight-card {
    padding: 28px;
    border-radius: 18px;
    text-align: center;
    color: white;
    transition: .3s;
}

.insight-card:hover {
    transform: translateY(-6px);
}

.insight-card h3 {
    margin-bottom: 18px;
    font-size: 20px;
}

.insight-card span {
    font-size: 42px;
    font-weight: bold;
}

.green {
    background: #16a34a;
}

.yellow {
    background: #d97706;
}

.blue {
    background: #2563eb;
}

.red {
    background: #dc2626;
}

</style>
</head>

<body>

<div class="container">

    <h1>
        <i class="fa-solid fa-chart-line"></i>
        Recruitment Analytics
    </h1>

    <p class="subtitle">
        Track hiring insights and recruitment performance.
    </p>
	<!-- ========================================= -->
	<!-- ANALYTICS CARDS -->
	<!-- ========================================= -->

	<div class="stats-grid">

	    <div class="stat-card">
	        <i class="fa-solid fa-users"></i>
	        <h3>Total Candidates</h3>
	        <span th:text="${totalCandidates}">0</span>
	    </div>

	    <div class="stat-card">
	        <i class="fa-solid fa-file-lines"></i>
	        <h3>Total Resumes</h3>
	        <span>—</span>
	    </div>

	    <div class="stat-card">
	        <i class="fa-solid fa-chart-line"></i>
	        <h3>Average ATS</h3>
	        <span>—</span>
	    </div>

	    <div class="stat-card">
	        <i class="fa-solid fa-trophy"></i>
	        <h3>Highest ATS</h3>
	        <span>—</span>
	    </div>

	</div>
	<!-- ========================================= -->
	<!-- RECRUITMENT INSIGHTS -->
	<!-- ========================================= -->

	<div class="analytics-section">

	    <h2>
	        <i class="fa-solid fa-lightbulb"></i>
	        Recruitment Insights
	    </h2>

	    <div class="insight-grid">

	        <div class="insight-card green">
	            <h3>Shortlisted</h3>
	            <span th:text="${shortlisted}">0</span>
	        </div>

	        <div class="insight-card yellow">
	            <h3>Under Review</h3>
	            <span th:text="${underReview}">0</span>
	        </div>

	        <div class="insight-card red">
	            <h3>Rejected</h3>
	            <span th:text="${rejected}">0</span>
	        </div>

	    </div>

	</div>
	</div>

	</body>
	</html>
