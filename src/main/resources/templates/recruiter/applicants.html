<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Applicants | PORTIX</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', sans-serif;
        }

        body {
            min-height: 100vh;
            background: #090b14;
            color: white;
        }

        /* HEADER */

        .header {
            padding: 28px 8%;
            background: #0d0f1a;
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .header-content {
            max-width: 1200px;
            margin: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 26px;
            font-weight: 800;
            letter-spacing: 1px;
        }

        .logo span {
            color: #8b5cf6;
        }

        .back-btn {
            text-decoration: none;
            color: white;
            padding: 10px 18px;
            border: 1px solid #8b5cf6;
            border-radius: 8px;
            transition: 0.3s;
        }

        .back-btn:hover {
            background: #8b5cf6;
        }

        /* MAIN */

        .container {
            width: 90%;
            max-width: 1100px;
            margin: 50px auto;
        }

        .page-header {
            margin-bottom: 35px;
        }

        .page-header h1 {
            font-size: 36px;
            margin-bottom: 10px;
        }

        .job-name {
            color: #c4b5fd;
            font-size: 20px;
            margin-bottom: 18px;
        }

        .application-count {
            display: inline-block;
            padding: 8px 15px;
            border-radius: 20px;
            background: rgba(139, 92, 246, 0.12);
            color: #c4b5fd;
            font-size: 14px;
        }

        /* APPLICANT GRID */

        .applicant-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
            gap: 22px;
        }

        .applicant-card {
            background: #11131f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
            padding: 25px;
            transition: 0.25s;
        }

        .applicant-card:hover {
            transform: translateY(-4px);
            border-color: rgba(139,92,246,0.6);
        }

        .card-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 15px;
            margin-bottom: 22px;
        }

        .candidate-name {
            font-size: 21px;
            margin-bottom: 7px;
        }

        .candidate-email {
            color: #9ca3af;
            font-size: 14px;
        }

        /* STATUS */

        .status {
            padding: 7px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            white-space: nowrap;
        }

        .status-applied {
            background: rgba(59,130,246,0.15);
            color: #93c5fd;
        }

        .status-shortlisted {
            background: rgba(34,197,94,0.15);
            color: #86efac;
        }

        .status-rejected {
            background: rgba(239,68,68,0.15);
            color: #fca5a5;
        }

        /* DETAILS */

        .details {
            padding: 18px 0;
            margin-bottom: 20px;
            border-top: 1px solid rgba(255,255,255,0.08);
            border-bottom: 1px solid rgba(255,255,255,0.08);
        }

        .detail-row {
            display: flex;
            justify-content: space-between;
            gap: 15px;
            font-size: 14px;
        }

        .detail-label {
            color: #9ca3af;
        }

        .detail-value {
            color: #e5e7eb;
        }

        /* ACTIONS */

        .actions {
            display: flex;
            gap: 12px;
        }

        .shortlist-btn,
        .reject-btn {
            flex: 1;
            text-align: center;
            text-decoration: none;
            padding: 12px;
            border-radius: 9px;
            font-size: 14px;
            font-weight: 600;
            transition: 0.3s;
        }

        .shortlist-btn {
            background: rgba(34,197,94,0.15);
            border: 1px solid rgba(34,197,94,0.35);
            color: #86efac;
        }

        .shortlist-btn:hover {
            background: #16a34a;
            color: white;
        }

        .reject-btn {
            background: rgba(239,68,68,0.15);
            border: 1px solid rgba(239,68,68,0.35);
            color: #fca5a5;
        }

        .reject-btn:hover {
            background: #dc2626;
            color: white;
        }

        /* EMPTY STATE */

        .empty-state {
            text-align: center;
            padding: 70px 20px;
            background: #11131f;
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 16px;
        }

        .empty-state h2 {
            margin-bottom: 10px;
        }

        .empty-state p {
            color: #9ca3af;
        }

        @media (max-width: 600px) {
            .header {
                padding: 22px 5%;
            }

            .container {
                width: 92%;
                margin-top: 35px;
            }

            .page-header h1 {
                font-size: 29px;
            }

            .applicant-grid {
                grid-template-columns: 1fr;
            }

            .card-top {
                flex-direction: column;
            }
        }

    </style>
</head>

<body>

<header class="header">

    <div class="header-content">

        <div class="logo">
            PORT<span>IX</span>
        </div>

        <a th:href="@{/recruiter/jobs}"
           class="back-btn">
            ← Back to Jobs
        </a>

    </div>

</header>


<main class="container">

    <div class="page-header">

        <h1>Job Applicants</h1>

        <div class="job-name"
             th:text="${job.jobTitle}">
            Job Title
        </div>

        <div class="application-count">
            Total Applications:
            <span th:text="${applications.size()}">0</span>
        </div>

    </div>


    <!-- APPLICANTS -->

    <div class="applicant-grid"
         th:if="${!applications.isEmpty()}">

        <div class="applicant-card"
             th:each="app, iterStat : ${applications}">

            <div th:with="candidate=${candidates[iterStat.index]}">

                <div class="card-top">

                    <div>

                        <h2 class="candidate-name"
                            th:text="${candidate != null ? candidate.fullName : 'Not Available'}">
                            Candidate Name
                        </h2>

                        <p class="candidate-email"
                           th:text="${candidate != null ? candidate.email : 'Not Available'}">
                            Candidate Email
                        </p>

                    </div>


                    <span class="status status-applied"
                          th:if="${app.status == 'Applied'}"
                          th:text="${app.status}">
                        Applied
                    </span>

                    <span class="status status-shortlisted"
                          th:if="${app.status == 'Shortlisted'}"
                          th:text="${app.status}">
                        Shortlisted
                    </span>

                    <span class="status status-rejected"
                          th:if="${app.status == 'Rejected'}"
                          th:text="${app.status}">
                        Rejected
                    </span>

                </div>


                <div class="details">

                    <div class="detail-row">

                        <span class="detail-label">
                            Applied Date
                        </span>

                        <span class="detail-value"
                              th:text="${app.appliedDate}">
                            Date
                        </span>

                    </div>

                </div>


                <div class="actions">

                    <a class="shortlist-btn"
                       th:href="@{/recruiter/application/{applicationId}/shortlist/{jobId}
                       (applicationId=${app.id}, jobId=${job.id})}">
                        ✓ Shortlist
                    </a>


                    <a class="reject-btn"
                       th:href="@{/recruiter/application/{applicationId}/reject/{jobId}
                       (applicationId=${app.id}, jobId=${job.id})}">
                        ✕ Reject
                    </a>

                </div>

            </div>

        </div>

    </div>


    <!-- NO APPLICANTS -->

    <div class="empty-state"
         th:if="${applications.isEmpty()}">

        <h2>No Applicants Yet</h2>

        <p>
            No candidates have applied for this job yet.
        </p>

    </div>

</main>

</body>

</html>
