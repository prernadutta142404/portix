<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Candidates | PORTIX</title>

    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css">

    <style>

        *{

            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:'Segoe UI',sans-serif;

        }

        body{

            background:#0b1023;
            color:white;
            padding:40px;

        }

        .container{

            max-width:1400px;
            margin:auto;

        }

        h1{

            font-size:42px;
            margin-bottom:12px;

        }

        .subtitle{

            color:#b7bfd8;
            margin-bottom:40px;

        }
		
		/* ========================================= */
		/* CANDIDATES TABLE */
		/* ========================================= */

		.table-container{

		    background:#18213d;
		    border-radius:18px;
		    padding:25px;
		    border:1px solid rgba(255,255,255,.08);

		}

		.candidate-table{

		    width:100%;
		    border-collapse:collapse;

		}

		.candidate-table thead{

		    background:#232d50;

		}

		.candidate-table th{

		    padding:18px;
		    text-align:left;
		    font-size:16px;

		}

		.candidate-table td{

		    padding:18px;
		    border-top:1px solid rgba(255,255,255,.08);

		}

		.candidate-table tbody tr{

		    transition:.3s;

		}

		.candidate-table tbody tr:hover{

		    background:#202a49;

		}

		.status{

		    display:inline-block;
		    padding:8px 16px;
		    border-radius:30px;
		    font-size:13px;
		    font-weight:600;

		}

		.shortlisted{

		    background:#1d6f42;
		    color:white;

		}

		.review{

		    background:#c08b00;
		    color:white;

		}

		.interview{

		    background:#2563eb;
		    color:white;

		}

		.view-btn{

		    border:none;
		    background:#7c5cff;
		    color:white;
		    padding:10px 18px;
		    border-radius:10px;
		    cursor:pointer;
		    transition:.3s;
		    font-weight:600;

		}

		.view-btn:hover{

		    background:#6845ff;

		}
		
		  </style>

		</head>
		
		<!-- ========================================= -->
		<!-- SEARCH BAR -->
		<!-- ========================================= -->


		<body>

		<div class="container">

		    <h1>

		        <i class="fa-solid fa-users"></i>

		        Candidates

		    </h1>

		    <p class="subtitle">

		        Manage all candidates from one place.

		    </p>

		
		
		

		        

		    
		    

		</div>

  



	
	
	<!-- ========================================= -->
	<!-- CANDIDATES TABLE -->
	<!-- ========================================= -->

	<div class="table-container">

	    <table class="candidate-table">

	        <thead>

	            <tr>

	                <th>Candidate</th>

	                <th>Email</th>

	                <th>Phone</th>

	                <th>Role</th>

	                <th>ATS</th>

	                <th>Status</th>

	                <th>Action</th>

	            </tr>

	        </thead>

			<tbody>

			    <tr th:each="candidate, stat : ${candidates}">

			        <td th:text="${candidate.fullName}">
			            Candidate Name
			        </td>

			        <td th:text="${candidate.email}">
			            candidate@email.com
			        </td>

			        <td>—</td>

					<td th:text="${jobTitles[applications[stat.index].jobId]}">
					    Job Title
					</td>

			        <td>—</td>

			        <td>
			            <span class="status review"
			                  th:text="${applications[stat.index].status}">
			                Applied
			            </span>
			        </td>

			        <td>
						<a th:href="@{/recruiter/candidate/{id}(id=${candidate.id})}"
						   class="view-btn">
						    View
						</a>
			        </td>

			    </tr>

			    <tr th:if="${#lists.isEmpty(candidates)}">
			        <td colspan="7"
			            style="text-align:center; color:#b7bfd8;">
			            No candidates have applied to your jobs yet.
			        </td>
			    </tr>

			</tbody>

	    </table>

	</div>
	
</div>

</body>

</html>
